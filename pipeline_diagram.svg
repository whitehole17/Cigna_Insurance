<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1180" viewBox="0 0 900 1180">
  <defs>
    <style>
      text { font-family: "Malgun Gothic","Apple SD Gothic Neo","Noto Sans KR",sans-serif; }
      .title { font-size:18px; font-weight:bold; fill:#1B1B1B; }
      .sub   { font-size:12px; fill:#555; }
      .lbl   { font-size:13px; font-weight:bold; fill:white; }
      .lbl-sm{ font-size:11px; font-weight:bold; fill:white; }
      .lbl-xs{ font-size:10px; fill:white; }
      .edge-lbl { font-size:10px; fill:#555; font-style:italic; }
      .edge-lbl-c { font-size:10px; fill:#C0392B; font-style:italic; }
      .edge-lbl-b { font-size:10px; fill:#1A6B8A; font-style:italic; }
      .edge-lbl-g { font-size:10px; fill:#1A6B3A; font-weight:bold; }
      .edge-lbl-r { font-size:10px; fill:#8B4500; font-weight:bold; }
      .legend-txt { font-size:11px; fill:#333; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#555"/>
    </marker>
    <marker id="arr-c" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#C0392B"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#1A6B8A"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#1A6B3A"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#8B4500"/>
    </marker>
    <marker id="arr-d" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#7B2D8B"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="900" height="1180" fill="#F5F7FA" rx="12"/>

  <!-- 제목 -->
  <text x="450" y="38" class="title" text-anchor="middle">Cigna RAG Demo 2 — LangGraph 파이프라인</text>
  <text x="450" y="58" class="sub" text-anchor="middle">SKN24 3차 프로젝트 4팀 · 김은우</text>

  <!-- ══════════════ 노드 ══════════════ -->

  <!-- 1. 사용자 질문 (stadium) -->
  <rect x="310" y="75" width="280" height="46" rx="23" fill="#2D6A4F"/>
  <text x="450" y="103" class="lbl" text-anchor="middle">사용자 질문</text>

  <!-- 화살표 1→2 -->
  <line x1="450" y1="121" x2="450" y2="145" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- 2. classify_question -->
  <rect x="265" y="145" width="370" height="64" rx="10" fill="#1B4F8A"/>
  <text x="450" y="170" class="lbl" text-anchor="middle">classify_question</text>
  <text x="450" y="188" class="lbl-xs" text-anchor="middle">난이도 + 정보 충족도 판단 (Low/Medium/High + missing_info)</text>

  <!-- 화살표 → HyDE Node (좌) -->
  <path d="M 330 177 C 220 177 180 260 180 290" fill="none" stroke="#C0392B" stroke-width="1.8" marker-end="url(#arr-c)"/>
  <text x="192" y="238" class="edge-lbl-c" text-anchor="middle">정보 부족</text>
  <text x="192" y="250" class="edge-lbl-c" text-anchor="middle">(missing_info ↑)</text>

  <!-- 화살표 → 난이도 분기 (우) -->
  <path d="M 570 177 C 680 177 720 260 720 290" fill="none" stroke="#7B2D8B" stroke-width="1.8" marker-end="url(#arr-d)"/>
  <text x="700" y="238" class="edge-lbl" text-anchor="middle">정보 충분</text>

  <!-- 3a. HyDE Node (좌) -->
  <rect x="60" y="290" width="240" height="72" rx="10" fill="#C0392B"/>
  <text x="180" y="316" class="lbl-sm" text-anchor="middle">HyDE Node</text>
  <text x="180" y="333" class="lbl-xs" text-anchor="middle">가상 답변 생성</text>
  <text x="180" y="350" class="lbl-xs" text-anchor="middle">(02-4_hyde 참고)</text>

  <!-- 3b. 난이도 분기 다이아몬드 (우) -->
  <polygon points="720,290 790,326 720,362 650,326" fill="#7B2D8B"/>
  <text x="720" y="322" class="lbl-sm" text-anchor="middle">난이도</text>
  <text x="720" y="338" class="lbl-sm" text-anchor="middle">분기</text>

  <!-- HyDE Node → HyDE 검색 -->
  <line x1="180" y1="362" x2="180" y2="430" stroke="#C0392B" stroke-width="1.8" marker-end="url(#arr-c)"/>

  <!-- 난이도 분기 → Low -->
  <path d="M 660 326 C 560 326 500 400 490 430" fill="none" stroke="#1A6B8A" stroke-width="1.6" marker-end="url(#arr-b)"/>
  <text x="555" y="380" class="edge-lbl-b" text-anchor="middle">Low</text>

  <!-- 난이도 분기 → Medium -->
  <path d="M 720 362 L 720 430" fill="none" stroke="#1A6B8A" stroke-width="1.6" marker-end="url(#arr-b)"/>
  <text x="735" y="408" class="edge-lbl-b">Medium</text>

  <!-- 난이도 분기 → High -->
  <path d="M 780 326 C 850 326 860 400 855 430" fill="none" stroke="#1A6B8A" stroke-width="1.6" marker-end="url(#arr-b)"/>
  <text x="840" y="378" class="edge-lbl-b">High</text>

  <!-- 4a. HyDE 검색 -->
  <rect x="60" y="430" width="240" height="62" rx="10" fill="#C0392B"/>
  <text x="180" y="456" class="lbl-sm" text-anchor="middle">HyDE 검색</text>
  <text x="180" y="473" class="lbl-xs" text-anchor="middle">가상 답변으로</text>
  <text x="180" y="488" class="lbl-xs" text-anchor="middle">벡터 검색</text>

  <!-- 4b. Dense Retriever -->
  <rect x="380" y="430" width="170" height="62" rx="10" fill="#1A6B8A"/>
  <text x="465" y="456" class="lbl-sm" text-anchor="middle">Dense Retriever</text>
  <text x="465" y="472" class="lbl-xs" text-anchor="middle">MMR 검색</text>
  <text x="465" y="487" class="lbl-xs" text-anchor="middle">(vectorstore_latest)</text>

  <!-- 4c. Hybrid -->
  <rect x="620" y="430" width="170" height="62" rx="10" fill="#1A6B8A"/>
  <text x="705" y="454" class="lbl-sm" text-anchor="middle">Hybrid Retriever</text>
  <text x="705" y="470" class="lbl-xs" text-anchor="middle">BM25 + Dense + RRF</text>
  <text x="705" y="485" class="lbl-xs" text-anchor="middle">(02-2, 02-3 참고)</text>

  <!-- 4d. Multi-hop -->
  <rect x="800" y="430" width="80" height="62" rx="10" fill="#1A6B8A"/>
  <text x="840" y="455" class="lbl-sm" text-anchor="middle">Multi-hop</text>
  <text x="840" y="470" class="lbl-xs" text-anchor="middle">3-hop</text>
  <text x="840" y="485" class="lbl-xs" text-anchor="middle">반복</text>

  <!-- 각 리트리버 → grade_documents -->
  <line x1="180" y1="492" x2="310" y2="600" stroke="#888" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="465" y1="492" x2="420" y2="600" stroke="#888" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="705" y1="492" x2="510" y2="600" stroke="#888" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="840" y1="492" x2="540" y2="600" stroke="#888" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- 5. grade_documents -->
  <rect x="210" y="600" width="480" height="68" rx="10" fill="#6B4E00"/>
  <text x="450" y="626" class="lbl" text-anchor="middle">grade_documents</text>
  <text x="450" y="644" class="lbl-xs" text-anchor="middle">검색 결과 관련성 평가 (yes / no)</text>
  <text x="450" y="659" class="lbl-xs" text-anchor="middle">(07_agentic_rag 참고 — GradeDocuments BaseModel)</text>

  <!-- grade → generate_answer (yes) -->
  <path d="M 300 668 L 240 750" fill="none" stroke="#1A6B3A" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="240" y="718" class="edge-lbl-g">yes</text>

  <!-- grade → rewrite_query (no, count&lt;2) -->
  <path d="M 560 668 L 620 750" fill="none" stroke="#6B4E00" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="600" y="718" class="edge-lbl">no, count&lt;2</text>

  <!-- grade → HyDE Fallback (no, count≥2) -->
  <path d="M 600 668 L 750 750" fill="none" stroke="#8B4500" stroke-width="1.8" marker-end="url(#arr-r)"/>
  <text x="700" y="700" class="edge-lbl-r">no, count≥2</text>

  <!-- 6a. generate_answer -->
  <rect x="60" y="750" width="320" height="72" rx="10" fill="#1A6B3A"/>
  <text x="220" y="776" class="lbl-sm" text-anchor="middle">generate_answer</text>
  <text x="220" y="793" class="lbl-xs" text-anchor="middle">Term Locking + 출처 인용</text>
  <text x="220" y="809" class="lbl-xs" text-anchor="middle">(01_rag_workflow 참고)</text>

  <!-- 6b. rewrite_query -->
  <rect x="530" y="750" width="190" height="72" rx="10" fill="#6B4E00"/>
  <text x="625" y="776" class="lbl-sm" text-anchor="middle">rewrite_query</text>
  <text x="625" y="793" class="lbl-xs" text-anchor="middle">쿼리 재작성</text>
  <text x="625" y="809" class="lbl-xs" text-anchor="middle">(07_agentic_rag 참고)</text>

  <!-- 6c. HyDE Fallback -->
  <rect x="730" y="750" width="150" height="72" rx="10" fill="#8B4500"/>
  <text x="805" y="775" class="lbl-sm" text-anchor="middle">HyDE Fallback</text>
  <text x="805" y="792" class="lbl-xs" text-anchor="middle">부족 정보 안내</text>
  <text x="805" y="808" class="lbl-xs" text-anchor="middle">+ 가상 답변</text>

  <!-- rewrite_query → 난이도 분기 루프백 -->
  <path d="M 625 822 C 625 890 860 890 860 400 C 860 362 790 362 780 326"
        fill="none" stroke="#7B2D8B" stroke-width="1.6" stroke-dasharray="6,3" marker-end="url(#arr-d)"/>
  <text x="868" y="640" class="edge-lbl" text-anchor="middle">재검색</text>
  <text x="868" y="652" class="edge-lbl" text-anchor="middle">루프</text>

  <!-- generate_answer → 최종 답변 -->
  <line x1="220" y1="822" x2="330" y2="940" stroke="#2D6A4F" stroke-width="1.8" marker-end="url(#arr-g)"/>

  <!-- HyDE Fallback → 최종 답변 -->
  <line x1="805" y1="822" x2="590" y2="940" stroke="#2D6A4F" stroke-width="1.8" marker-end="url(#arr-g)"/>

  <!-- 7. 최종 답변 -->
  <rect x="190" y="940" width="520" height="54" rx="27" fill="#2D6A4F"/>
  <text x="450" y="971" class="lbl" text-anchor="middle">최종 답변  (출처 인용 + 부족 정보 안내)</text>

  <!-- ══════════════ 범례 ══════════════ -->
  <rect x="30" y="1030" width="840" height="130" rx="10" fill="white" stroke="#DDD" stroke-width="1"/>
  <text x="450" y="1054" class="sub" text-anchor="middle" font-weight="bold">노드 유형 범례</text>

  <rect x="50" y="1065" width="14" height="14" rx="3" fill="#1B4F8A"/>
  <text x="70" y="1077" class="legend-txt">분류 노드 (classify_question)</text>

  <rect x="230" y="1065" width="14" height="14" rx="3" fill="#C0392B"/>
  <text x="250" y="1077" class="legend-txt">HyDE 노드 (02-4_hyde 참고)</text>

  <rect x="430" y="1065" width="14" height="14" rx="3" fill="#1A6B8A"/>
  <text x="450" y="1077" class="legend-txt">리트리버 노드 (02-2, 02-3, 02-9)</text>

  <rect x="650" y="1065" width="14" height="14" rx="3" fill="#6B4E00"/>
  <text x="670" y="1077" class="legend-txt">평가·재작성 (07_agentic_rag)</text>

  <rect x="50" y="1095" width="14" height="14" rx="3" fill="#1A6B3A"/>
  <text x="70" y="1107" class="legend-txt">답변 생성 (01_rag_workflow)</text>

  <rect x="230" y="1095" width="14" height="14" rx="3" fill="#8B4500"/>
  <text x="250" y="1107" class="legend-txt">HyDE 폴백 (부족 정보 + 가상 답변)</text>

  <rect x="430" y="1095" width="14" height="14" rx="3" fill="#7B2D8B"/>
  <text x="450" y="1107" class="legend-txt">분기 노드 (난이도 결정)</text>

  <rect x="650" y="1095" width="14" height="14" rx="3" fill="#2D6A4F"/>
  <text x="670" y="1107" class="legend-txt">시작 / 종료</text>

  <line x1="50" y1="1132" x2="80" y2="1132" stroke="#7B2D8B" stroke-width="1.6" stroke-dasharray="5,3"/>
  <text x="88" y="1136" class="legend-txt">재검색 루프 (rewrite → 분기)</text>
</svg>